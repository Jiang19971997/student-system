<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台 - 学生教、学、评系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">学生教、学、评系统</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="admin.html">后台管理</a>
        <a class="nav-link" href="dashboard.html">数据看板</a>
        <a class="nav-link" href="#" id="logoutBtn">退出登录</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="col-md-3">
        <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
          <button class="nav-link active" id="v-pills-students-tab" data-bs-toggle="pill" data-bs-target="#v-pills-students">学生管理</button>
          <button class="nav-link" id="v-pills-courses-tab" data-bs-toggle="pill" data-bs-target="#v-pills-courses">课程管理</button>
          <button class="nav-link" id="v-pills-assignments-tab" data-bs-toggle="pill" data-bs-target="#v-pills-assignments">作业管理</button>
          <button class="nav-link" id="v-pills-grade-tab" data-bs-toggle="pill" data-bs-target="#v-pills-grade">作业批改</button>
        </div>
      </div>
      <div class="col-md-9">
        <div class="tab-content" id="v-pills-tabContent">
          <!-- 学生管理 -->
          <div class="tab-pane fade show active" id="v-pills-students">
            <div class="card mb-3">
              <div class="card-header">添加学生</div>
              <div class="card-body">
                <form id="addStudentForm">
                  <div class="row mb-3">
                    <div class="col-md-4">
                      <label class="form-label">姓名</label>
                      <input type="text" class="form-control" id="studentName" required>
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">班级</label>
                      <input type="text" class="form-control" id="studentClass" required>
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">学号</label>
                      <input type="text" class="form-control" id="studentId" required>
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary">添加</button>
                </form>
              </div>
            </div>
            <div class="card">
              <div class="card-header">学生列表</div>
              <div class="card-body">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>姓名</th>
                      <th>班级</th>
                      <th>学号</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="studentsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- 课程管理 -->
          <div class="tab-pane fade" id="v-pills-courses">
            <div class="card mb-3">
              <div class="card-header">添加课程</div>
              <div class="card-body">
                <form id="addCourseForm">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label">课程名称</label>
                      <input type="text" class="form-control" id="courseName" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">授课老师</label>
                      <input type="text" class="form-control" id="courseTeacher" required>
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary">添加</button>
                </form>
              </div>
            </div>
            <div class="card">
              <div class="card-header">课程列表</div>
              <div class="card-body">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>课程名称</th>
                      <th>授课老师</th>
                    </tr>
                  </thead>
                  <tbody id="coursesTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- 作业管理 -->
          <div class="tab-pane fade" id="v-pills-assignments">
            <div class="card mb-3">
              <div class="card-header">发布作业</div>
              <div class="card-body">
                <form id="addAssignmentForm">
                  <div class="mb-3">
                    <label class="form-label">所属课程</label>
                    <select class="form-select" id="assignmentCourseId" required></select>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">作业标题</label>
                    <input type="text" class="form-control" id="assignmentTitle" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">作业描述</label>
                    <textarea class="form-control" id="assignmentDesc" rows="3"></textarea>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">截止日期</label>
                    <input type="date" class="form-control" id="assignmentDueDate" required>
                  </div>
                  <button type="submit" class="btn btn-primary">发布</button>
                </form>
              </div>
            </div>
            <div class="card">
              <div class="card-header">作业列表</div>
              <div class="card-body">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>标题</th>
                      <th>所属课程</th>
                      <th>截止日期</th>
                    </tr>
                  </thead>
                  <tbody id="assignmentsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- 作业批改 -->
          <div class="tab-pane fade" id="v-pills-grade">
            <div class="mb-3">
              <label class="form-label">选择作业</label>
              <select class="form-select" id="gradeAssignmentId" required></select>
              <button type="button" class="btn btn-secondary mt-2" id="loadSubmissionsBtn">加载提交记录</button>
            </div>
            <div class="card">
              <div class="card-header">作业提交列表</div>
              <div class="card-body">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>学生姓名</th>
                      <th>提交内容</th>
                      <th>提交时间</th>
                      <th>评分</th>
                      <th>评语</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="submissionsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');
    
    // 验证登录状态
    if (!token) {
      window.location.href = 'index.html';
    }

    // 退出登录
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });

    // -------------------------- 学生管理 --------------------------
    // 加载学生列表
    function loadStudents() {
      fetch(`${API_BASE}/students`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('studentsTableBody');
          tbody.innerHTML = '';
          data.forEach(student => {
            tbody.innerHTML += `
              <tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.class}</td>
                <td>${student.student_id}</td>
                <td>
                  <button class="btn btn-sm btn-danger delete-student" data-id="${student.id}">删除</button>
                </td>
              </tr>
            `;
          });
          // 绑定删除事件
          document.querySelectorAll('.delete-student').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              if (confirm('确定删除该学生吗？')) {
                fetch(`${API_BASE}/students/${id}`, { method: 'DELETE' })
                  .then(() => loadStudents());
              }
            });
          });
        });
    }

    // 添加学生
    document.getElementById('addStudentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('studentName').value;
      const className = document.getElementById('studentClass').value;
      const studentId = document.getElementById('studentId').value;
      fetch(`${API_BASE}/students`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, class: className, student_id: studentId })
      }).then(() => {
        loadStudents();
        document.getElementById('addStudentForm').reset();
      });
    });

    // -------------------------- 课程管理 --------------------------
    function loadCourses() {
      fetch(`${API_BASE}/courses`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('coursesTableBody');
          const courseSelect = document.getElementById('assignmentCourseId');
          tbody.innerHTML = '';
          courseSelect.innerHTML = '<option value="">请选择课程</option>';
          data.forEach(course => {
            tbody.innerHTML += `
              <tr>
                <td>${course.id}</td>
                <td>${course.name}</td>
                <td>${course.teacher}</td>
              </tr>
            `;
            courseSelect.innerHTML += `<option value="${course.id}">${course.name}</option>`;
          });
        });
    }

    document.getElementById('addCourseForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('courseName').value;
      const teacher = document.getElementById('courseTeacher').value;
      fetch(`${API_BASE}/courses`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, teacher })
      }).then(() => {
        loadCourses();
        document.getElementById('addCourseForm').reset();
      });
    });

    // -------------------------- 作业管理 --------------------------
    function loadAssignments() {
      fetch(`${API_BASE}/assignments`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('assignmentsTableBody');
          const gradeSelect = document.getElementById('gradeAssignmentId');
          tbody.innerHTML = '';
          gradeSelect.innerHTML = '<option value="">请选择作业</option>';
          data.forEach(assignment => {
            tbody.innerHTML += `
              <tr>
                <td>${assignment.id}</td>
                <td>${assignment.title}</td>
                <td>${assignment.course_id}</td>
                <td>${assignment.due_date}</td>
              </tr>
            `;
            gradeSelect.innerHTML += `<option value="${assignment.id}">${assignment.title}</option>`;
          });
        });
    }

    document.getElementById('addAssignmentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const course_id = document.getElementById('assignmentCourseId').value;
      const title = document.getElementById('assignmentTitle').value;
      const description = document.getElementById('assignmentDesc').value;
      const due_date = document.getElementById('assignmentDueDate').value;
      fetch(`${API_BASE}/assignments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ course_id, title, description, due_date })
      }).then(() => {
        loadAssignments();
        document.getElementById('addAssignmentForm').reset();
      });
    });

    // -------------------------- 作业批改 --------------------------
    document.getElementById('loadSubmissionsBtn').addEventListener('click', () => {
      const assignmentId = document.getElementById('gradeAssignmentId').value;
      if (!assignmentId) return alert('请选择作业');
      fetch(`${API_BASE}/submissions/assignment/${assignmentId}`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('submissionsTableBody');
          tbody.innerHTML = '';
          data.forEach(submission => {
            tbody.innerHTML += `
              <tr>
                <td>${submission.name}</td>
                <td>${submission.content || '无内容'}</td>
                <td>${submission.submitted_at}</td>
                <td><input type="number" class="form-control score-input" data-id="${submission.id}" value="${submission.score || ''}" min="0" max="100"></td>
                <td><input type="text" class="form-control comment-input" data-id="${submission.id}" value="${submission.comment || ''}"></td>
                <td><button class="btn btn-sm btn-primary save-grade" data-id="${submission.id}">保存</button></td>
              </tr>
            `;
          });
          // 绑定保存评分事件
          document.querySelectorAll('.save-grade').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              const score = document.querySelector(`.score-input[data-id="${id}"]`).value;
              const comment = document.querySelector(`.comment-input[data-id="${id}"]`).value;
              fetch(`${API_BASE}/submissions/${id}/grade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ score, comment })
              }).then(() => alert('评分保存成功'));
            });
          });
        });
    });

    // 页面加载时初始化数据
    loadStudents();
    loadCourses();
    loadAssignments();
  </script>
</body>
</html>
