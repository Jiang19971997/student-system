<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>学生端 - 学生教、学、评系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">学生教、学、评系统</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="student.html">我的学习</a>
        <a class="nav-link" href="#" id="logoutBtn">退出</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <div class="card mb-4">
          <div class="card-header">课程列表</div>
          <div class="card-body">
            <ul class="list-group" id="coursesList"></ul>
          </div>
        </div>
        <div class="card">
          <div class="card-header">我的成绩</div>
          <div class="card-body">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>作业名称</th>
                  <th>提交时间</th>
                  <th>评分</th>
                  <th>评语</th>
                </tr>
              </thead>
              <tbody id="gradesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">提交作业</div>
          <div class="card-body">
            <form id="submitAssignmentForm">
              <div class="mb-3">
                <label class="form-label">选择作业</label>
                <select class="form-select" id="studentAssignmentId" required></select>
              </div>
              <div class="mb-3">
                <label class="form-label">输入学号</label>
                <input type="text" class="form-control" id="studentIdInput" required placeholder="请输入你的学号">
              </div>
              <div class="mb-3">
                <label class="form-label">作业内容</label>
                <textarea class="form-control" id="assignmentContent" rows="5" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">提交作业</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';

    // 加载课程和作业
    function loadStudentData() {
      // 加载课程
      fetch(`${API_BASE}/courses`)
        .then(res => res.json())
        .then(courses => {
          const coursesList = document.getElementById('coursesList');
          coursesList.innerHTML = '';
          courses.forEach(course => {
            coursesList.innerHTML += `<li class="list-group-item">${course.name} (授课老师：${course.teacher})</li>`;
          });
        });

      // 加载作业
      fetch(`${API_BASE}/assignments`)
        .then(res => res.json())
        .then(assignments => {
          const assignmentSelect = document.getElementById('studentAssignmentId');
          assignmentSelect.innerHTML = '<option value="">请选择作业</option>';
          assignments.forEach(assignment => {
            assignmentSelect.innerHTML += `<option value="${assignment.id}">${assignment.title} (截止：${assignment.due_date})</option>`;
          });
        });
    }

    // 提交作业
    document.getElementById('submitAssignmentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const assignment_id = document.getElementById('studentAssignmentId').value;
      const student_id_input = document.getElementById('studentIdInput').value;
      const content = document.getElementById('assignmentContent').value;

      // 根据学号查找学生ID
      fetch(`${API_BASE}/students`)
        .then(res => res.json())
        .then(students => {
          const student = students.find(s => s.student_id === student_id_input);
          if (!student) return alert('学号不存在');
          
          // 提交作业
          fetch(`${API_BASE}/submissions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              student_id: student.id,
              assignment_id,
              content
            })
          }).then(() => {
            alert('作业提交成功！');
            document.getElementById('submitAssignmentForm').reset();
            loadStudentGrades(student.id);
          });
        });
    });

    // 加载学生成绩
    function loadStudentGrades(studentId) {
      fetch(`${API_BASE}/submissions/student/${studentId}`)
        .then(res => res.json())
        .then(submissions => {
          const tbody = document.getElementById('gradesTableBody');
          tbody.innerHTML = '';
          submissions.forEach(sub => {
            tbody.innerHTML += `
              <tr>
                <td>作业${sub.assignment_id}</td>
                <td>${sub.submitted_at}</td>
                <td>${sub.score || '未评分'}</td>
                <td>${sub.comment || '无'}</td>
              </tr>
            `;
          });
        });
    }

    loadStudentData();
  </script>
</body>
</html>
