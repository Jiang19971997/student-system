<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>数据看板 - 学生教、学、评系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">学生教、学、评系统</a>
      <div class="navbar-nav">
        <a class="nav-link" href="admin.html">后台管理</a>
        <a class="nav-link active" href="dashboard.html">数据看板</a>
        <a class="nav-link" href="#" id="logoutBtn">退出登录</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <!-- 基础统计 -->
      <div class="col-md-3">
        <div class="stat-card bg-white">
          <h5 class="text-muted">班级平均分</h5>
          <div class="stat-value" id="avgScore">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card bg-white">
          <h5 class="text-muted">最高分</h5>
          <div class="stat-value" id="maxScore">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card bg-white">
          <h5 class="text-muted">最低分</h5>
          <div class="stat-value" id="minScore">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card bg-white">
          <h5 class="text-muted">作业提交率</h5>
          <div class="stat-value" id="submitRate">0%</div>
        </div>
      </div>

      <!-- 图表 -->
      <div class="col-md-6">
        <div class="card mb-4">
          <div class="card-header">分数段分布</div>
          <div class="card-body">
            <canvas id="scoreRangeChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">作业提交统计</div>
          <div class="card-body">
            <canvas id="submitChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
      window.location.href = 'index.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });

    // 加载统计数据
    function loadStats() {
      fetch(`${API_BASE}/dashboard/stats`)
        .then(res => res.json())
        .then(data => {
          // 更新基础统计
          document.getElementById('avgScore').textContent = data.avg_score;
          document.getElementById('maxScore').textContent = data.max_score;
          document.getElementById('minScore').textContent = data.min_score;
          document.getElementById('submitRate').textContent = `${data.submit_rate}%`;

          // 分数段分布图表
          const rangeLabels = data.score_ranges.map(item => item.range);
          const rangeData = data.score_ranges.map(item => item.count);
          new Chart(document.getElementById('scoreRangeChart'), {
            type: 'bar',
            data: {
              labels: rangeLabels,
              datasets: [{
                label: '人数',
                data: rangeData,
                backgroundColor: 'rgba(13, 110, 253, 0.7)'
              }]
            }
          });

          // 提交率饼图
          new Chart(document.getElementById('submitChart'), {
            type: 'pie',
            data: {
              labels: ['已提交', '未提交'],
              datasets: [{
                data: [data.submitted, data.total - data.submitted],
                backgroundColor: ['rgba(13, 110, 253, 0.7)', 'rgba(220, 53, 69, 0.7)']
              }]
            }
          });
        });
    }

    loadStats();
  </script>
</body>
</html>
